<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工事工程ガント管理｜初期版</title>
    <meta name="description" content="工務店向けの工事工程ガント管理アプリ初期版" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@1.0.3/dist/frappe-gantt.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button id="openProjectDrawerBtn" class="icon-btn" type="button" aria-label="工事一覧を開く">☰</button>
          <div>
            <p class="eyebrow">Kouji Gantt Manager / Prototype</p>
            <h1>工事工程ガント管理</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="loadSampleBtn" class="btn btn-ghost" type="button">初期データ</button>
          <button id="saveBtn" class="btn btn-primary" type="button">保存</button>
          <button id="openDetailDrawerBtn" class="icon-btn" type="button" aria-label="詳細を開く">⚙</button>
        </div>
      </header>

      <main class="layout full">
        <section class="workspace-full card">
          <div class="section-header">
            <div>
              <p class="eyebrow">Gantt Chart</p>
              <h2 id="projectTitle">工程表</h2>
            </div>
            <div class="view-toggle">
              <label class="field-inline view-mode-inline">
                表示単位
                <select id="viewModeSelect">
                  <option value="Day">日</option>
                  <option value="Week">週</option>
                  <option value="Month">月</option>
                </select>
              </label>
              <button id="viewGanttBtn" class="btn btn-ghost is-active" type="button">ガント表示</button>
              <button id="viewTableBtn" class="btn btn-ghost" type="button">一覧表示</button>
            </div>
          </div>
          <p id="projectMeta" class="muted">工事を選択してください。</p>
          <div class="gantt-scroll" id="ganttWrap">
            <div id="gantt"></div>
          </div>
          <section id="taskTableSection" class="task-table-card" hidden>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>工程</th>
                    <th>分類</th>
                    <th>開始日</th>
                    <th>終了日</th>
                    <th>工期</th>
                    <th>進捗</th>
                    <th>担当</th>
                    <th>状態</th>
                  </tr>
                </thead>
                <tbody id="taskTableBody"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>

      <div id="projectDrawerBackdrop" class="drawer-backdrop" hidden></div>
      <aside id="projectDrawer" class="drawer left" aria-hidden="true">
        <div class="drawer-header">
          <div>
            <p class="eyebrow">Projects</p>
            <h2>工事一覧</h2>
          </div>
          <button id="closeProjectDrawerBtn" class="icon-btn" type="button" aria-label="閉じる">×</button>
        </div>
        <div class="drawer-body">
          <div class="panel-title-row">
            <button id="addProjectBtn" class="icon-btn" type="button" aria-label="工事を追加">＋</button>
          </div>

          <div id="folderTabs" class="folder-tabs" aria-label="工事フォルダ">
            <button class="folder-tab" type="button" data-folder="pre-contract">契約前 <span>0</span></button>
            <button class="folder-tab" type="button" data-folder="active">着手中 <span>0</span></button>
            <button class="folder-tab" type="button" data-folder="completed">完了 <span>0</span></button>
            <button class="folder-tab" type="button" data-folder="trash">ゴミ箱 <span>0</span></button>
          </div>

          <div id="projectList" class="project-list"></div>
        </div>
      </aside>

      <aside id="detailDrawer" class="drawer right" aria-hidden="true">
        <div class="drawer-header">
          <div>
            <p class="eyebrow">Project Detail</p>
            <h2>詳細</h2>
          </div>
          <button id="closeDetailDrawerBtn" class="icon-btn" type="button" aria-label="閉じる">×</button>
        </div>
        <div class="drawer-body">
          <details class="detail-section" data-section="project">
            <summary>工事</summary>
            <input id="projectId" type="hidden" />
            <div class="form-grid">
              <label>
                工事名
                <input id="projectName" type="text" />
              </label>
              <label>
                顧客名
                <input id="projectCustomer" type="text" />
              </label>
              <label class="span-2">
                現場住所
                <input id="projectAddress" type="text" />
              </label>
              <label>
                工事区分
                <select id="projectType">
                  <option value="新築">新築</option>
                  <option value="改装">改装</option>
                  <option value="内装">内装</option>
                  <option value="外構">外構</option>
                  <option value="その他">その他</option>
                </select>
              </label>
              <label>
                フォルダ
                <select id="projectFolder">
                  <option value="pre-contract">契約前</option>
                  <option value="active">着手中</option>
                  <option value="completed">完了</option>
                </select>
              </label>
              <label>
                状態
                <select id="projectStatus">
                  <option value="契約前">契約前</option>
                  <option value="予定">予定</option>
                  <option value="進行中">進行中</option>
                  <option value="完了">完了</option>
                  <option value="保留">保留</option>
                </select>
              </label>
              <label>
                担当者
                <input id="projectManager" type="text" />
              </label>
              <label class="span-2">
                メモ
                <textarea id="projectMemo" rows="3"></textarea>
              </label>
            </div>
            <div class="detail-actions">
              <button id="applyProjectInfoBtn" class="btn btn-primary" type="button">工事を保存</button>
              <button id="cancelProjectEditBtn" class="btn btn-ghost" type="button">取り消し</button>
            </div>
          </details>

          <details class="detail-section" data-section="schedule">
            <summary>日程</summary>
            <div class="date-control-grid one-col">
              <div class="date-control-item">
                <label for="quickStartInput">着工予定日</label>
                <div class="date-stepper">
                  <button id="startMinusBtn" class="icon-btn" type="button" aria-label="着工予定日を1日前へ">−</button>
                  <input id="quickStartInput" type="date" />
                  <button id="startPlusBtn" class="icon-btn" type="button" aria-label="着工予定日を1日後へ">＋</button>
                </div>
              </div>
              <div class="date-control-item">
                <label for="quickEndInput">完工予定日</label>
                <div class="date-stepper">
                  <button id="endMinusBtn" class="icon-btn" type="button" aria-label="完工予定日を1日前へ">−</button>
                  <input id="quickEndInput" type="date" />
                  <button id="endPlusBtn" class="icon-btn" type="button" aria-label="完工予定日を1日後へ">＋</button>
                </div>
              </div>
              <label class="checkbox-field">
                <input id="shiftTasksByStartCheckbox" type="checkbox" checked />
                着工日変更時、工程も同じ日数だけ移動
              </label>
              <button id="applyProjectDatesBtn" class="btn btn-primary" type="button">日程を反映</button>
            </div>
          </details>

          <details class="detail-section" data-section="task">
            <summary>工程</summary>
            <div class="toolbar-left">
              <button id="addTaskBtn" class="btn" type="button">工程を追加</button>
              <button id="generateTemplateBtn" class="btn" type="button">ひな形を追加</button>
            </div>
            <input id="taskId" type="hidden" />
            <div class="form-grid task-simple-grid">
              <label class="span-2">
                工程名
                <input id="taskName" type="text" />
              </label>
              <label>
                開始日
                <input id="taskStart" type="date" />
              </label>
              <label>
                終了日
                <input id="taskEnd" type="date" />
              </label>
              <label>
                進捗率
                <input id="taskProgress" type="number" min="0" max="100" step="5" />
              </label>
              <label class="span-2">
                メモ
                <textarea id="taskMemo" rows="3"></textarea>
              </label>
            </div>
            <div class="detail-actions">
              <button id="saveTaskBtn" class="btn btn-primary" type="button">工程を保存</button>
              <button id="cancelTaskEditBtn" class="btn btn-ghost" type="button">取り消し</button>
              <button id="deleteTaskBtn" class="btn btn-danger" type="button">工程を削除</button>
            </div>
          </details>

          <details class="detail-section" data-section="cloud">
            <summary>保存先（クラウド）</summary>
            <label class="field-inline column">
              保存先URL
              <input id="gasUrlInput" type="url" placeholder="未設定：サンプルデータで動作" />
            </label>
            <p class="hint">管理者が共有用のURLを設定します。</p>
            <button id="loadFromGasBtn" class="btn btn-ghost" type="button">最新の状態に更新</button>
          </details>
        </div>
      </aside>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/frappe-gantt@1.0.3/dist/frappe-gantt.umd.js"></script>
    <script src="./js/sampleData.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/gantt.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
